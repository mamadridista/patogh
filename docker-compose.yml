
services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: patogh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: Patogh_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-patogh_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Patogh_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: patogh_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: src/Patogh.API/Dockerfile
    container_name: patogh_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=Patogh_DB;Username=postgres;Password=${POSTGRES_PASSWORD:-patogh_secret}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redis_secret}"
      JwtSettings__Secret: ${DszK8534JV1YIJwKQGhAWax3eYVptTrW}
      JwtSettings__Issuer: PatoghAPI
      JwtSettings__Audience: PatoghClient
      JwtSettings__ExpirationInMinutes: "60"
      JwtSettings__RefreshTokenExpirationDays: "30"
      OtpSettings__ExpiryMinutes: "3"
      ReservationSettings__DefaultDurationHours: "2"
      ReservationSettings__ReminderBeforeMinutes: "60"
    ports:
      - "8080:8080"
    volumes:
      # Persist uploaded media outside the container
      - uploads:/app/Uploads
      - logs:/app/logs
    healthcheck:
      # Uses wget (installed in Dockerfile) instead of curl
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local

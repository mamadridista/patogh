version: '3.9'

# This file overrides docker-compose.yml for local development.
# It is gitignored in production deployments.
services:

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=Patogh_DB;Username=postgres;Password=patogh_secret"
      ConnectionStrings__Redis: "redis:6379,password=redis_secret"
      JwtSettings__Secret: "DEVELOPMENT_SECRET_KEY_MIN_32_CHARACTERS_LONG"
      JwtSettings__ExpirationInMinutes: "1440"
    ports:
      - "8080:8080"